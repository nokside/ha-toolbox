blueprint:
  name: Aqara W100 Sync (ZHA)
  description: |-
    Flexible sync for Aqara W100 (ZHA).

    * **Bidirectional Climate Sync:** Mirror HVAC mode, target temperature, and fan speed between the W100 and any primary thermostat.
    * **Smart Safeguards:** HVAC mode and fan speed are auto-corrected when W100 requests one the primary doesn't support. Temperature from W100 is clamped to the primary's supported range; temperature from primary is skipped when outside W100's range.
    * **Sensor Reporting:** Push live temperature and humidity to the W100 screen from your thermostat or other sensors.

    Climate sync and sensor reporting work independently — enable only what you need.

    ⚠️ **Requires [custom quirk](https://github.com/nokside/ha-toolbox/blob/main/quirks/aqara_w100.py)**
    ⚠️ Depending on your setup, enable *External sensor*, *Thermostat control mode*, and/or *Show fan* in W100 device settings.
  domain: automation
  source_url: https://raw.githubusercontent.com/nokside/ha-toolbox/refs/heads/main/blueprints/automation/aqara_w100.yaml
  author: nokside
  input:
    w100_climate:
      name: Aqara W100
      description: |
        Required for thermostat sync and/or external sensor sync.
      selector:
        entity:
          filter:
            - integration: zha
              domain: climate
    primary_climate:
      name: Primary thermostat / AC
      default: []
      selector:
        entity:
          filter:
            - domain: climate
    sync_primary_temp_hum:
      name: Sync primary thermostat temperature and humidity to W100
      default: false
      selector:
        boolean:
    temperature_sensor:
      name: Temperature sensor
      description: |
        When selected, takes priority over thermostat temperature sync.
      default: []
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: temperature
    humidity_sensor:
      name: Humidity sensor
      description: |
        When selected, takes priority over thermostat humidity sync.
      default: []
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: humidity

mode: queued
max_exceeded: silent

trigger_variables:
  _primary: !input primary_climate
  _temp_sensor: !input temperature_sensor
  _hum_sensor: !input humidity_sensor
  _sync_primary_temp_hum: !input sync_primary_temp_hum

triggers:

  - trigger: state
    entity_id: !input w100_climate
    id: mode
    enabled: "{{ _primary != [] }}"
    not_from:
      - unavailable
      - unknown
    not_to:
      - unavailable
      - unknown
      
  - trigger: state
    entity_id: !input primary_climate
    id: mode
    enabled: "{{ _primary != [] }}"
    not_from:
      - unavailable
      - unknown
    not_to:
      - unavailable
      - unknown

  - trigger: state
    entity_id: !input w100_climate
    id: temperature
    enabled: "{{ _primary != [] }}"
    attribute: temperature

  - trigger: state
    entity_id: !input w100_climate
    id: fan
    enabled: "{{ _primary != [] }}"
    attribute: fan_mode

  - trigger: state
    entity_id: !input primary_climate
    id: temperature
    enabled: "{{ _primary != [] }}"
    attribute: temperature

  - trigger: state
    entity_id: !input primary_climate
    id: fan
    enabled: "{{ _primary != [] }}"
    attribute: fan_mode

  - trigger: state
    entity_id: !input w100_climate
    from: unavailable
    id: resync
    enabled: "{{ _primary != [] }}"

  - trigger: state
    entity_id: !input primary_climate
    from: unavailable
    id: resync
    enabled: "{{ _primary != [] }}"

  - trigger: homeassistant
    event: start
    id: resync

  - trigger: event
    event_type: automation_reloaded
    id: resync

  - trigger: state
    entity_id: !input primary_climate
    attribute: current_temperature
    id: ext_temp
    enabled: "{{ _sync_primary_temp_hum is true and _temp_sensor == [] and _primary != [] }}"

  - trigger: state
    entity_id: !input primary_climate
    attribute: current_humidity
    id: ext_hum
    enabled: "{{ _sync_primary_temp_hum is true and _hum_sensor == [] and _primary != [] }}"

  - trigger: state
    entity_id: !input temperature_sensor
    id: ext_temp
    enabled: "{{ _temp_sensor != [] }}"
    not_to:
      - unavailable
      - unknown

  - trigger: state
    entity_id: !input humidity_sensor
    id: ext_hum
    enabled: "{{ _hum_sensor != [] }}"
    not_to:
      - unavailable
      - unknown

variables:
  w100: !input w100_climate
  primary: !input primary_climate
  sync_primary_temp_hum: !input sync_primary_temp_hum
  temp_sensor: !input temperature_sensor
  hum_sensor: !input humidity_sensor

conditions:
  - alias: Check if w100 is available
    condition: template
    value_template: "{{ has_value(w100) }}"

actions:
  - alias: Climate sync
    if:
      - condition: trigger
        id:
          - fan
          - mode
          - temperature
          - resync
      - condition: template
        value_template: "{{ primary != [] and has_value(primary) }}"
    then:
      - alias: Set source, target
        variables:
          source: |-
            {% if trigger.id == 'resync' %}
              {{ primary }}
            {% else %}
              {{ trigger.entity_id | default(primary) }}
            {% endif %}
          target: "{{ primary if source == w100 else w100 }}"
      - alias: Mode sync
        if:
          - condition: trigger
            id:
              - mode
              - resync
        then:
          - variables:
              source_mode: "{{ states(source) }}"
              target_mode: "{{ states(target) }}"
          - condition: template
            value_template: "{{ source_mode != target_mode }}"
          - variables:
              target_modes: "{{ state_attr(target, 'hvac_modes') | default([], true) }}"
              source_modes: "{{ state_attr(source, 'hvac_modes') | default([], true) }}"
              auto_modes:
                - heat_cool
                - auto
              mode_target: |-
                {{ source if source == w100 and not (
                     (source_mode in auto_modes and (auto_modes | select('in', target_modes) | list))
                     or source_mode in target_modes
                   ) else target }}
              mapped_mode: |-
                {%- if mode_target == source -%}
                  {{ target_mode if target_mode in source_modes else source_mode }}
                {%- elif source_mode in auto_modes -%}
                  {{ auto_modes | select('in', target_modes) | first | default(target_mode) }}
                {%- else -%}
                  {{ source_mode if source_mode in target_modes else target_mode }}
                {%- endif -%}
          - condition: template
            value_template: >-
              {{ mapped_mode != (target_mode if mode_target == target else
              source_mode) }}
          - action: climate.set_hvac_mode
            target:
              entity_id: "{{ mode_target }}"
            data:
              hvac_mode: "{{ mapped_mode }}"
      - alias: Temperature sync
        if:
          - condition: trigger
            id:
              - temperature
              - resync
        then:
          - variables:
              source_temp: "{{ state_attr(source, 'temperature') }}"
              target_temp: "{{ state_attr(target, 'temperature') }}"
          - condition: template
            value_template: |-
              {{ source_temp is number
                 and source_temp != target_temp
                 and states(source) == states(target)
                 and states(source) != 'off' }}
          - variables:
              temp_data: |-
                {%- if target == w100 -%}
                  {{ source_temp | round(1) if 4.5 <= source_temp <= 37.0 else target_temp }}
                {%- else -%}
                  {%- set t_min = state_attr(target, 'min_temp') | float(-999) -%}
                  {%- set t_max = state_attr(target, 'max_temp') | float(999) -%}
                  {{ max(t_min, min(source_temp, t_max)) | round(1) }}
                {%- endif -%}
              temp_target: >-
                {{ source if source == w100 and temp_data == target_temp else
                target }}
          - condition: template
            value_template: >-
              {{ temp_data != (target_temp if temp_target == target else
              source_temp) }}
          - action: climate.set_temperature
            target:
              entity_id: "{{ temp_target }}"
            data:
              temperature: "{{ temp_data }}"
      - alias: Fan sync
        if:
          - condition: trigger
            id:
              - fan
              - resync
        then:
          - variables:
              source_fan: "{{ state_attr(source, 'fan_mode') }}"
              target_fan: "{{ state_attr(target, 'fan_mode') }}"
          - condition: template
            value_template: >-
              {{ source_fan is not none and target_fan is not none and
              source_fan != target_fan }}
          - variables:
              target_fans: "{{ state_attr(target, 'fan_modes') | default([], true) }}"
              source_fans: "{{ state_attr(source, 'fan_modes') | default([], true) }}"
              fan_target: >-
                {{ source if source == w100 and source_fan not in target_fans
                else target }}
              fan_data: |-
                {%- if fan_target == source -%}
                  {{ target_fan if target_fan in source_fans else source_fan }}
                {%- else -%}
                  {{ source_fan if source_fan in target_fans else target_fan }}
                {%- endif -%}
          - condition: template
            value_template: >-
              {{ fan_data != (target_fan if fan_target == target else
              source_fan) }}
          - action: climate.set_fan_mode
            target:
              entity_id: "{{ fan_target }}"
            data:
              fan_mode: "{{ fan_data }}"
  - alias: External temperature
    if:
      - condition: trigger
        id:
          - ext_temp
          - resync
      - condition: or
        conditions:
          - condition: template
            value_template: "{{ sync_primary_temp_hum is true and has_value(primary) }}"
          - condition: template
            value_template: "{{ temp_sensor != [] }}"
    then:
      - alias: Set external temperature variables
        variables:
          ext_temp_data: >-
            {{ states(temp_sensor) if temp_sensor != [] else state_attr(primary,
            'current_temperature') }}
          ext_temp_entity: >-
            {{ device_entities(device_id(w100)) | select('search',
            'external_temperature') | first | default('') }}
      - condition: template
        value_template: |-
          {{ is_number(ext_temp_data)
             and is_number(states(ext_temp_entity))
             and ext_temp_data | float | round(1) != states(ext_temp_entity) | float | round(1) }}
      - action: number.set_value
        target:
          entity_id: "{{ ext_temp_entity }}"
        data:
          value: "{{ ext_temp_data }}"
  - alias: External humidity
    if:
      - condition: trigger
        id:
          - ext_hum
          - resync
      - condition: or
        conditions:
          - condition: template
            value_template: "{{ sync_primary_temp_hum is true and has_value(primary) }}"
          - condition: template
            value_template: "{{ hum_sensor != [] }}"
    then:
      - alias: Set external humidity variables
        variables:
          ext_hum_data: >-
            {{states(hum_sensor) if hum_sensor != [] else state_attr(primary,
            'current_humidity')}}
          ext_hum_entity: >-
            {{ device_entities(device_id(w100)) | select('search',
            'external_humidity') | first | default('') }}
      - condition: template
        value_template: |-
          {{ is_number(ext_hum_data)
             and is_number(states(ext_hum_entity))
             and ext_hum_data | int != states(ext_hum_entity) | int }}
      - action: number.set_value
        target:
          entity_id: "{{ ext_hum_entity }}"
        data:
          value: "{{ ext_hum_data }}"

